version: '3'

services:
    backend:
        image: ${DOCKER_USER}/docker-project-backend:latest
        ports:
            - 8081-8082:8081
        networks:
            - app
        deploy:
            resources:
                limits:
                    cpus: '0.1'
                    memory: 100M
            replicas: 2
        cap_drop:
            - ALL
        cap_add:
           - NET_BIND_SERVICE
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
            interval: 45s
            timeout: 15s
            retries: 5
            start_period: 15s
        restart: on-failure

    frontend:
        image: ${DOCKER_USER}/docker-project-frontend:latest
        ports: 
            - 9990:80
        networks:
            - app
            - front
        depends_on:
            backend:
                condition: service_healthy
        volumes:
          - ./frontendVolume:/var/logs/nginx
        deploy:
            resources:
                limits:
                    cpus: '0.05'
                    memory: 50M
        cap_drop:
            - ALL
        cap_add:
            - NET_BIND_SERVICE
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:80/catalog"]
            interval: 45s
            timeout: 15s
            retries: 5
            start_period: 15s
        restart: on-failure

        
networks:
    app:
        driver: bridge
        internal: true
    front:
        driver: bridge
        driver_opts:
            com.docker.network.bridge.host_binding_ipv4: "127.0.0.1"
volumes:
    frontendVolume: